<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>METMC Digital Store</title><style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );

    font-family:Arial,sans-serif;
    color:white;
}

/* AUTH CARD */

.card{
    width:100%;
    max-width:420px;

    background:#111827;

    padding:35px;

    border-radius:20px;

    border:1px solid #334155;

    box-shadow:
    0 15px 40px rgba(0,0,0,.4);
}

/* LOGO */

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#38bdf8;
    font-size:28px;
    margin-bottom:5px;
}

.logo p{
    color:#94a3b8;
    font-size:14px;
}

/* TITLES */

h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUTS */

input,
select,
textarea{
    width:100%;

    padding:12px;

    margin-bottom:15px;

    border:none;

    border-radius:10px;

    background:#1e293b;

    color:white;
}

input:focus,
select:focus,
textarea:focus{
    outline:2px solid #38bdf8;
}

/* BUTTON */

button{
    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#38bdf8;

    color:black;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    opacity:.9;
}

/* LINKS */

a{
    color:#38bdf8;
    text-decoration:none;
}

.auth-link{
    text-align:center;
    margin-top:15px;
}

/* FLASH */

.flash{
    background:#22c55e;

    color:white;

    padding:12px;

    border-radius:10px;

    margin-bottom:15px;

    text-align:center;
}

/* FOOTER */

.footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:13px;
}

</style></head><body><div class="card"><div class="logo">
    <h1>METMC</h1>
    <p>Digital Store</p>
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}

<div class="flash">
    {{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

{% block content %}
{% endblock %}

<div class="footer">
    Version 2.0
</div>

</div></body>
</html>
