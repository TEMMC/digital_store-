<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    width:300px;
}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}

button {
    width:100%;
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>

    <button>Login</button>
</form>

<p><a href="/register">Create account</a></p>
</div>

</body>
</html>
