<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login - METMC Digital Store</title><style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGIN BOX */
.box{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:350px;
    border:1px solid #1e293b;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1e293b;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    color:black;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

/* LINK */
a{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* SMALL TEXT */
small{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#94a3b8;
}

</style></head><body><div class="box"><h2>🔐 Login</h2><form method="POST"><input name="username" placeholder="Username" required><input name="password" type="password" placeholder="Password" required><button type="submit">Login</button>

</form><a href="/register">Create a new account</a>

<small>METMC Digital Store v2.0</small>

</div></body>
</html>
