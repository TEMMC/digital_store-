<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Add Product - METMC Digital Store
</title>

<style>

    body {

        font-family: Arial, sans-serif;
        background: #f5f5f5;

        max-width: 900px;

        margin: auto;
        padding: 20px;

    }

    .container {

        background: white;

        padding: 20px;

        border-radius: 10px;

    }

    h1 {

        text-align: center;

    }

    label {

        display: block;

        margin-top: 15px;

        font-weight: bold;

    }

    input,
    textarea,
    select {

        width: 100%;

        padding: 12px;

        margin-top: 5px;

        border: 1px solid #ccc;

        border-radius: 5px;

        box-sizing: border-box;

    }

    textarea {

        resize: vertical;

    }

    .flash {

        background: #fff3cd;

        color: #856404;

        padding: 10px;

        border-radius: 5px;

        margin-bottom: 15px;

    }

    .btn {

        width: 100%;

        padding: 15px;

        margin-top: 20px;

        border: none;

        border-radius: 5px;

        cursor: pointer;

        font-size: 16px;

        background: #007bff;

        color: white;

    }

</style>

</head><body><div class="container"><h1>
    Add Product
</h1>

<!-- ===================== -->
<!-- FLASH MESSAGES -->
<!-- ===================== -->

{% with messages = get_flashed_messages() %}

    {% if messages %}

        {% for message in messages %}

            <div class="flash">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

{% endwith %}

<!-- ===================== -->
<!-- ADD PRODUCT FORM -->
<!-- ===================== -->

<form method="POST">

    <label>
        Product Name
    </label>

    <input
        type="text"
        name="name"
        required
    >

    <label>
        Description
    </label>

    <textarea
        name="description"
        rows="6"
    ></textarea>

    <label>
        Category
    </label>

    <select name="category">

        <option value="Apps">Apps</option>

        <option value="Games">Games</option>

        <option value="Documents">Documents</option>

        <option value="Music">Music</option>

        <option value="Videos">Videos</option>

        <option value="Ebooks">Ebooks</option>

        <option value="Scripts">Scripts</option>

        <option value="Templates">Templates</option>

        <option value="Courses">Courses</option>

        <option value="AI Tools">AI Tools</option>

        <option value="Graphics">Graphics</option>

        <option value="Themes">Themes</option>

        <option value="Plugins">Plugins</option>

        <option value="Source Code">Source Code</option>

        <option value="Education">Education</option>

        <option value="Business">Business</option>

        <option value="News">News</option>

    </select>

    <label>
        Price
    </label>

    <input
        type="number"
        step="0.01"
        min="0"
        name="price"
        value="0"
    >

    <br>

    <input
        type="checkbox"
        name="is_free"
        id="is_free"
    >

    <label for="is_free">

        Free Product

    </label>

    <label>
        Product Download URL
    </label>

    <input
        type="url"
        name="file_url"
        placeholder="https://example.com/file.zip"
        required
    >

    <label>
        Product Image URL
    </label>

    <input
        type="url"
        name="image_url"
        placeholder="https://example.com/image.jpg"
    >

    <button
        type="submit"
        class="btn"
    >
        Add Product
    </button>

</form>

</div></body></html>
