<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Product - METMC</title><style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px;
}

/* CONTAINER */
.box{
    width:100%;
    max-width:700px;
    background:#111827;
    padding:25px;
    border-radius:15px;
    border:1px solid #1e293b;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

/* INPUTS */
input, select, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#1e293b;
    color:white;
}

textarea{
    min-height:100px;
    resize:none;
}

/* LABEL */
label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#cbd5e1;
    font-size:14px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* CHECKBOX */
.check{
    display:flex;
    align-items:center;
    gap:8px;
    margin:10px 0;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    opacity:0.9;
}

/* SECTION */
.section{
    margin-top:20px;
    padding-top:10px;
    border-top:1px solid #1e293b;
}

small{
    color:#94a3b8;
}

</style></head><body><div class="box"><h2>🚀 Upload New Product</h2><form method="POST" enctype="multipart/form-data"><!-- BASIC INFO --><label>Product Name</label>
<input name="name" placeholder="e.g AI Chatbot App" required>

<label>Description</label>

<textarea name="description" placeholder="Describe your product..."></textarea><div class="grid"><div>
<label>Price ($)</label>
<input name="price" type="number" step="0.01">
</div><div>
<label>Category</label>
<select name="category" required>
    <option value="">Select Category</option>
    {% for c in [
        "Apps","Games","Documents","Music","Videos","Ebooks",
        "Scripts","Templates","Courses","AI Tools","Graphics",
        "Themes","Plugins","Source Code","Business","Education"
    ] %}
        <option value="{{ c }}">{{ c }}</option>
    {% endfor %}
</select>
</div></div><div class="check">
<input type="checkbox" name="is_free">
<label>Make this a FREE product</label>
</div><!-- FILES --><div class="section">
<h3>📦 Product Files</h3>
<small>Upload your main product file (zip, apk, pdf, etc.)</small>
<input type="file" name="file" required>
</div><div class="section">
<h3>🖼️ Product Image</h3>
<small>Thumbnail shown on marketplace</small>
<input type="file" name="image">
</div><!-- ADVANCED --><div class="section">
<h3>⚙️ Advanced Options</h3><label>Tags</label>
<input name="tags" placeholder="ai, python, flask">

<label>Version</label>
<input name="version" placeholder="v1.0">

<label>Demo Link</label>
<input name="demo_link" placeholder="https://">

<label>Platform</label>
<select name="platform">
<option>Web</option>
<option>Android</option>
<option>Windows</option>
<option>Linux</option>
<option>Cross Platform</option>
</select>

<label>License</label>
<select name="license">
<option>Personal</option>
<option>Commercial</option>
<option>Open Source</option>
</select>

<div class="check">
<input type="checkbox" name="featured">
<label>⭐ Mark as Featured</label>
</div><div class="check">
<input type="checkbox" name="trending">
<label>🔥 Trending Product</label>
</div></div><button type="submit">Upload Product 🚀</button>

</form></div></body>
</html>
