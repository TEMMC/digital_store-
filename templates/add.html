<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Product</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    width:500px;
    max-height:90vh;
    overflow-y:auto;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="box">

<h2>Add Product</h2>

<form method="POST" enctype="multipart/form-data">

  <input name="name" placeholder="Product name" required>

  <textarea name="description" placeholder="Description"></textarea>

  <input name="price" type="number" step="0.01" placeholder="Price">

  <select name="category" required>
    <option value="">Select Category</option>

    <option value="Apps">Apps</option>
    <option value="Games">Games</option>
    <option value="Documents">Documents</option>
    <option value="Music">Music</option>
    <option value="Videos">Videos</option>

    <option value="AI Tools">AI Tools</option>
    <option value="Software">Software</option>
    <option value="Ebooks">Ebooks</option>
    <option value="Courses">Courses</option>
    <option value="Templates">Templates</option>
    <option value="Scripts">Scripts</option>
    <option value="Bots">Bots</option>
    <option value="Graphics">Graphics</option>
    <option value="Themes">Themes</option>
    <option value="Plugins">Plugins</option>
    <option value="Source Code">Source Code</option>
  </select>

  <label>📦 Product File</label>
  <input type="file" name="file">

  <label>🖼️ Product Image</label>
  <input type="file" name="image">

  <label>
    <input type="checkbox" name="is_free"> Free Product
  </label>

  <button type="submit">Upload Product</button>

  <hr>

  <label>🏷️ Tags</label>
  <input type="text" name="tags" placeholder="python, ai, flask">

  <label>⭐ Product Version</label>
  <input type="text" name="version" placeholder="v1.0">

  <label>🔗 Demo Link</label>
  <input type="url" name="demo_link" placeholder="https://">

  <label>📱 Platform</label>
  <select name="platform">
      <option>Android</option>
      <option>Windows</option>
      <option>Linux</option>
      <option>Web</option>
      <option>Cross Platform</option>
  </select>

  <label>📂 Sub Category</label>
  <select name="subcategory">
      <option>Software</option>
      <option>Templates</option>
      <option>Ebooks</option>
      <option>Courses</option>
      <option>Scripts</option>
      <option>Bots</option>
  </select>

  <label>🎨 Featured Product</label>
  <input type="checkbox" name="featured">

  <label>📸 More Screenshots</label>
  <input type="file" name="screenshots" multiple>

  <label>📦 Product Size</label>
  <input type="text" name="size" placeholder="15 MB">

  <label>🔑 License Type</label>
  <select name="license">
      <option>Personal</option>
      <option>Commercial</option>
      <option>Open Source</option>
  </select>

  <label>📞 Seller Contact</label>
  <input type="text" name="contact">

  <label>🌐 Website</label>
  <input type="url" name="website">

  <label>📹 Product Video</label>
  <input type="url" name="video">

  <label>🚀 New Release</label>
  <input type="checkbox" name="new_release">

  <label>🔥 Trending</label>
  <input type="checkbox" name="trending">

</form>

</div>

</body>
</html>
